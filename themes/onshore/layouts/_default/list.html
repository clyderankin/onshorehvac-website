{{ define "main" }}
<section class="page-hero">
  <div class="container">
    <p class="label">{{ .Title }}</p>
    <h1>{{ with .Params.headline }}{{ . }}{{ else }}{{ .Title }}{{ end }}</h1>
    {{ with .Params.subtitle }}<p class="hero-sub">{{ . }}</p>{{ end }}
  </div>
</section>
<section class="section">
  <div class="container">
    <div class="card-grid">
      {{ range .Pages }}
      <a href="{{ .RelPermalink }}" class="card">
        <span class="card-label">{{ .Params.label | default .Title }}</span>
        <h3>{{ .Title }}</h3>
        <p>{{ .Description }}</p>
        <span class="card-arrow">&rarr;</span>
      </a>
      {{ end }}
    </div>
  </div>
</section>
{{ end }}
